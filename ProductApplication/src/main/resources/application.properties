spring.application.name=ProductApplication
server.port=8083

spring.datasource.url=jdbc:mysql://mysql-db:3306/productdb?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.datasource.hikari.connectionTimeout=60000
spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.validationTimeout=5000
spring.datasource.hikari.connectionTestQuery=SELECT 1

spring.data.redis.host=redis-server
spring.data.redis.port=6379